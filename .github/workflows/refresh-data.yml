name: Refresh GTFS data

# Weekly regen of public/data/{frequencies,routes,stops,meta}.{json,geojson}.
# Runs Mondays 06:00 UTC (Sunday 10–11 PM Pacific) and any time a maintainer
# hits "Run workflow" in the Actions tab. If the upstream GTFS feed hasn't
# changed, the job no-ops without opening a PR. Otherwise it opens
# `chore: refresh GTFS data — <feed_version>` against main for human review.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Prevent overlapping runs from stomping on each other's branches.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh data and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node
        # actions/setup-node@v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture pre-refresh snapshot
        run: npx tsx scripts/refresh-summary.ts --capture /tmp/refresh-before.json

      - name: Refresh GTFS data
        run: npm run prepare-data

      - name: Build PR body and outputs
        id: summary
        run: |
          npx tsx scripts/refresh-summary.ts \
            --summary /tmp/refresh-before.json /tmp/refresh-body.md \
            >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        # peter-evans/create-pull-request@v8.1.1
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          commit-message: |
            chore: refresh GTFS data (feed ${{ steps.summary.outputs.feed_after }})

            Generated ${{ steps.summary.outputs.generated_at }} by refresh-data.yml.
          branch: data/refresh-${{ steps.summary.outputs.today }}
          delete-branch: true
          title: "chore: refresh GTFS data — ${{ steps.summary.outputs.feed_after }}"
          body-path: /tmp/refresh-body.md
          labels: data-refresh
